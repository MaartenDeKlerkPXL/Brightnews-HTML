<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightNews - Lancering</title>
    <style>
        :root {
            --bright-green: #32cc32;
            --dark-bg: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: black;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .logo {
            max-width: 100rem;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .highlight {
            color: var(--bright-green);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Simpele animatie om de aandacht te trekken */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .logo { max-width: 180px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="assets/brightnews-logo.png" alt="BrightNews Logo" class="logo">

    <p>Maak je klaar voor iets nieuws.</p>
    <h1 class="pulse">Lancering op <span class="highlight">20 maart 2026</span></h1>

    <div style="margin-top: 50px; border-top: 1px solid #333; padding-top: 20px;">
        <p style="font-size: 0.9rem;">BrightNews &copy; 2026</p>
    </div>
</div>

</body>
</html>
